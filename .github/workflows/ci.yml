name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Prevent concurrent version bumps from conflicting
concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  version-bump:
    runs-on: self-hosted
    timeout-minutes: 5
    # NOTE: Self-hosted runners should be isolated and secured.
    # See: https://docs.github.com/en/actions/hosting-your-own-runners/managing-self-hosted-runners/about-self-hosted-runners#self-hosted-runner-security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        # SHA pinned for supply chain security
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get merged PR number
        id: get-pr
        run: |
          # Extract PR number from merge commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          # Use sed for portability (works on both macOS and Linux)
          PR_NUMBER=$(echo "$COMMIT_MSG" | sed -n 's/.*Merge pull request #\([0-9]*\).*/\1/p' | head -1)

          # Fallback: search for PR number in squash merge format (#123)
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(echo "$COMMIT_MSG" | sed -n 's/.*(\#\([0-9]*\)).*/\1/p' | head -1)
          fi

          # Fallback: search for PR reference at end of first line (feat: description #123)
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(echo "$COMMIT_MSG" | head -1 | sed -n 's/.*#\([0-9]*\)$/\1/p')
          fi

          # Validate PR_NUMBER is numeric only (security: prevent command injection)
          if [ -n "$PR_NUMBER" ] && ! echo "$PR_NUMBER" | grep -qE '^[0-9]+$'; then
            echo "Invalid PR number format: $PR_NUMBER"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

          if [ -z "$PR_NUMBER" ]; then
            echo "No PR number found in commit message. Skipping version bump."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Found PR #$PR_NUMBER"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Get PR labels
        id: get-labels
        if: steps.get-pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.get-pr.outputs.pr_number }}"

          # Get labels using GitHub CLI
          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name' 2>/dev/null || echo "")

          echo "Labels found: $LABELS"

          # Check for version labels
          if echo "$LABELS" | grep -q "version:major"; then
            echo "bump_type=major" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "version:minor"; then
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "version:patch"; then
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          else
            echo "No version label found. Skipping version bump."
            echo "bump_type=none" >> $GITHUB_OUTPUT
          fi

      - name: Compute new version
        id: compute-version
        if: steps.get-pr.outputs.skip != 'true' && steps.get-labels.outputs.bump_type != 'none'
        run: |
          BUMP_TYPE="${{ steps.get-labels.outputs.bump_type }}"

          # Extract current version from pyproject.toml (portable sed)
          CURRENT_VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml)
          echo "Current version: $CURRENT_VERSION"

          # Validate version format (security: prevent malformed input)
          if ! echo "$CURRENT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format in pyproject.toml: $CURRENT_VERSION"
            exit 1
          fi

          # Parse version components (POSIX-compliant)
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          # Compute new version
          case "$BUMP_TYPE" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
          esac

          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Update pyproject.toml
        if: steps.get-pr.outputs.skip != 'true' && steps.get-labels.outputs.bump_type != 'none'
        run: |
          NEW_VERSION="${{ steps.compute-version.outputs.new_version }}"
          CURRENT_VERSION="${{ steps.compute-version.outputs.current_version }}"

          # Update version in pyproject.toml (portable: works on both macOS and Linux)
          if [ "$(uname)" = "Darwin" ]; then
            sed -i '' "s/version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" pyproject.toml
          else
            sed -i "s/version = \"$CURRENT_VERSION\"/version = \"$NEW_VERSION\"/" pyproject.toml
          fi

          # Verify the change
          grep "version = " pyproject.toml

      - name: Commit and push version bump
        if: steps.get-pr.outputs.skip != 'true' && steps.get-labels.outputs.bump_type != 'none'
        run: |
          NEW_VERSION="${{ steps.compute-version.outputs.new_version }}"
          CURRENT_VERSION="${{ steps.compute-version.outputs.current_version }}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are changes to commit
          if git diff --quiet pyproject.toml; then
            echo "No changes to commit"
            exit 0
          fi

          # Commit and push with error handling
          git add pyproject.toml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          if ! git push; then
            echo "::error::Push failed - check branch protection rules or concurrent merges"
            exit 1
          fi

          # Write job summary
          echo "## Version Bump" >> $GITHUB_STEP_SUMMARY
          echo "- **Old:** $CURRENT_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **New:** $NEW_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump type:** ${{ steps.get-labels.outputs.bump_type }}" >> $GITHUB_STEP_SUMMARY

  lint-test:
    runs-on: self-hosted
    timeout-minutes: 10
    # NOTE: Self-hosted runners should be isolated and secured.
    # See: https://docs.github.com/en/actions/hosting-your-own-runners/managing-self-hosted-runners/about-self-hosted-runners#self-hosted-runner-security
    steps:
      - name: Checkout repository
        id: checkout
        # SHA pinned for supply chain security
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        continue-on-error: false

      - name: Set up Python 3.12
        id: setup-python
        # SHA pinned for supply chain security
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
        continue-on-error: false

      - name: Install dependencies
        id: install
        timeout-minutes: 3
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        continue-on-error: false

      - name: Run ruff
        id: ruff
        timeout-minutes: 2
        run: ruff check . --color=always
        continue-on-error: false

      - name: Run black
        id: black
        timeout-minutes: 2
        run: black --check . --color
        continue-on-error: false

      - name: Run mypy
        id: mypy
        timeout-minutes: 3
        run: mypy . --color-output
        continue-on-error: false

      - name: Run pytest
        id: pytest
        timeout-minutes: 5
        run: pytest --tb=short -q --color=yes
        continue-on-error: false

      - name: Write job summary
        id: summary
        if: always()
        run: |
          echo "## Lint & Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ruff | ${{ steps.ruff.outcome || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| black | ${{ steps.black.outcome || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| mypy | ${{ steps.mypy.outcome || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| pytest | ${{ steps.pytest.outcome || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
