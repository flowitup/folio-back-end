<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You've been added to {{ project_name }} on {{ app_name }}</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background: #f4f4f4; padding: 32px 0;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background: #ffffff; border-radius: 6px; padding: 32px; max-width: 560px;">
          <tr>
            <td>
              <h2 style="color: #1a1a1a; margin-top: 0;">You've been added to a project</h2>
              <p style="color: #444444; line-height: 1.6;">
                <strong>{{ inviter_name }}</strong> has added you to
                <strong>{{ project_name }}</strong> on <strong>{{ app_name }}</strong>
                as <strong>{{ role_name }}</strong>.
              </p>
              <p style="text-align: center; margin: 32px 0;">
                <a href="{{ accept_url }}"
                   style="background: #2563eb; color: #ffffff; text-decoration: none;
                          padding: 12px 28px; border-radius: 4px; font-weight: bold; display: inline-block;">
                  View Project
                </a>
              </p>
              <p style="color: #888888; font-size: 13px;">
                If you believe this was a mistake, please contact your project administrator.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
